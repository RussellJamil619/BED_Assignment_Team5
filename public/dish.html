<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dish — Team 5 Hawker Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="wrap">
  <p><a href="menu.html">← Back to menu</a></p>
  <div id="dish" class="panel" style="max-width:640px"><p class="note">Loading…</p></div>
</main>

<script src="js/api.js"></script>
<script>
navInit("menu"); footerInit();
const el = document.getElementById("dish");
const id = qsParam("id");

async function load() {
  try {
    // One call returns the dish AND its cuisines — Leslie's M:N LEFT JOIN endpoint
    const d = await api(EP.menuItemCuisines(id));
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:start;gap:1rem">
        <div>
          <span class="eyebrow">Stall ${d.stall_id}</span>
          <h1 style="font-size:2rem" id="dishName">${d.name}</h1>
        </div>
        <span class="price" style="font-size:1.15rem">${money(d.price)}</span>
      </div>
      <p id="dishDesc">${d.description ?? ""}</p>
      <p>
        <span class="chip cat-${d.category}">${d.category}</span>
        ${d.cuisines.map(c => `<span class="chip">${c.cuisine_name}</span>`).join("")}
        ${d.cuisines.length === 0 ? '<span class="note">No cuisines tagged yet</span>' : ""}
      </p>
      ${d.is_available ? "" : '<p class="soldout">Currently sold out</p>'}

      <div style="display:flex;gap:.6rem;align-items:center;flex-wrap:wrap;margin-top:1rem">
        <button class="small" id="addCart" ${d.is_available ? "" : "disabled"}>Add to cart</button>
        <button class="small ghost" id="likeBtn">♥ Like</button>
        <span class="note" id="likeCount"></span>
        <span class="spacer" style="flex:1"></span>
        <label for="lang" class="note" style="margin:0">Language</label>
        <select id="lang" style="width:auto">
          <option value="en">English</option><option value="zh">中文</option>
          <option value="ms">Bahasa Melayu</option><option value="ta">தமிழ்</option>
        </select>
      </div>
      <p class="note" id="msg"></p>`;

    wire(d);
  } catch (err) { el.innerHTML = ""; showErrors(el, err); }
}

function wire(d) {
  const msg = document.getElementById("msg");

  // Like — Russell's feature. Confirm path in js/api.js (EP.likeToggle).
  loadLikes();
  document.getElementById("likeBtn").addEventListener("click", async () => {
    if (!isLoggedIn()) { toast("Log in to like dishes"); return; }
    try { await api(EP.likeToggle(id), { method: "POST" }); loadLikes(); }
    catch (err) { toast(err.body?.message ?? "Like endpoint not wired yet — see js/api.js"); }
  });

  // Add to cart — Justin's feature. Confirm path in js/api.js (EP.cart).
  document.getElementById("addCart").addEventListener("click", async () => {
    if (!isLoggedIn()) { toast("Log in to order"); return; }
    try {
      await api(EP.cart, { method: "POST", body: { menu_item_id: Number(id), quantity: 1 } });
      toast("Added to cart");
    } catch (err) { toast(err.body?.message ?? "Cart endpoint not wired yet — see js/api.js"); }
  });

  // Translation — Leslie's Sprint 3 story (L12). Falls back to English politely.
  document.getElementById("lang").addEventListener("change", async e => {
    const lang = e.target.value;
    if (lang === "en") { document.getElementById("dishName").textContent = d.name;
      document.getElementById("dishDesc").textContent = d.description ?? ""; msg.textContent = ""; return; }
    try {
      const t = await api(EP.translate(id, lang));
      document.getElementById("dishName").textContent = t.name ?? d.name;
      document.getElementById("dishDesc").textContent = t.description ?? d.description ?? "";
      msg.textContent = t.warning ?? "";
    } catch { msg.textContent = "Translation coming after Final Submission — showing English."; }
  });
}

async function loadLikes() {
  try {
    const r = await api(EP.likeCount(id));
    document.getElementById("likeCount").textContent = (r.count ?? r.likes ?? 0) + " likes";
  } catch { document.getElementById("likeCount").textContent = ""; }
}

load();
</script>
</body>
</html>
