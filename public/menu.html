<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Menu — Team 5 Hawker Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="wrap">
  <span class="eyebrow">Leslie's feature — MenuItem</span>
  <h1>The menu</h1>
  <p class="lede">Every dish across every stall. Filter by category or stall —
  the filters call the same API with query parameters.</p>

  <div class="panel" style="max-width:100%;display:flex;gap:1rem;flex-wrap:wrap;align-items:end;margin:1.2rem 0">
    <div style="flex:1;min-width:150px">
      <label for="cat">Category</label>
      <select id="cat">
        <option value="">All</option><option>Main</option><option>Drink</option><option>Dessert</option>
      </select>
    </div>
    <div style="flex:1;min-width:150px">
      <label for="stall">Stall</label>
      <select id="stall"><option value="">All stalls</option></select>
    </div>
    <p class="note" id="count" style="margin:.4rem 0 .6rem"></p>
  </div>

  <div id="menuGrid" class="grid cards"><p class="note">Loading dishes…</p></div>
</main>

<script src="js/api.js"></script>
<script>
navInit("menu"); footerInit();

const grid = document.getElementById("menuGrid");
const catSel = document.getElementById("cat");
const stallSel = document.getElementById("stall");
const count = document.getElementById("count");

async function load() {
  const params = new URLSearchParams();
  if (catSel.value) params.set("category", catSel.value);
  if (stallSel.value) params.set("stall_id", stallSel.value);
  const q = params.toString() ? "?" + params.toString() : "";
  try {
    const result = await api(EP.menuItems + q);       // { count, data }
    count.textContent = result.count + " dish" + (result.count === 1 ? "" : "es") + " found";
    grid.innerHTML = result.data.map(d => `
      <a class="card" href="dish.html?id=${d.menu_item_id}">
        <div style="display:flex;justify-content:space-between;align-items:start">
          <h3>${d.name}</h3><span class="price">${money(d.price)}</span>
        </div>
        <p class="note">${d.description ?? ""}</p>
        <span class="chip cat-${d.category}">${d.category}</span>
        <span class="chip">Stall ${d.stall_id}</span>
        ${d.is_available ? "" : '<p class="soldout">Sold out</p>'}
      </a>`).join("");
  } catch (err) {
    grid.innerHTML = ""; showErrors(grid, err);
  }
}

// Build the stall filter from the data itself (until Leslie's /stalls exists)
async function buildStallFilter() {
  try {
    const result = await api(EP.menuItems);
    [...new Set(result.data.map(d => d.stall_id))].sort((a,b)=>a-b)
      .forEach(id => stallSel.insertAdjacentHTML("beforeend", `<option value="${id}">Stall ${id}</option>`));
  } catch { /* filter simply stays as "All stalls" */ }
}

catSel.addEventListener("change", load);
stallSel.addEventListener("change", load);
buildStallFilter().then(load);
</script>
</body>
</html>
