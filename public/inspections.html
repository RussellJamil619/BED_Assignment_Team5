<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inspections — Team 5 Hawker Centre</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<main class="wrap">
  <span class="eyebrow">Arri's feature — Inspections</span>
  <h1>Inspection records</h1>
  <p class="lede">NEA officers log hygiene inspections here. Scores map to the public
  letter grades shown on the home page.</p>

  <div style="display:flex;gap:1rem;align-items:end;flex-wrap:wrap;margin:1.2rem 0">
    <div style="min-width:200px">
      <label for="stallFilter">Filter by stall</label>
      <select id="stallFilter"><option value="">All stalls</option></select>
    </div>
    <button class="small" id="newBtn" style="margin:0 0 .35rem">+ Log new inspection</button>
  </div>

  <div id="tableBox"><p class="note">Loading inspections…</p></div>

  <!-- create / edit form -->
  <form id="inspForm" class="panel" style="display:none;margin-top:1.5rem">
    <h3 id="formTitle">Log new inspection</h3>
    <div id="lockedInfo" class="note" style="display:none"></div>
    <div id="createOnly">
      <label for="stallId">Stall ID</label>
      <input id="stallId" type="number" min="1" required>
      <label for="officerId">Officer ID</label>
      <input id="officerId" type="number" min="1" required>
    </div>
    <label for="score">Score (0–100)</label>
    <input id="score" type="number" min="0" max="100" required>
    <label for="remarks">Remarks</label>
    <textarea id="remarks" rows="3"></textarea>
    <div id="formErrors"></div>
    <div style="display:flex;gap:.6rem">
      <button type="submit">Save inspection</button>
      <button type="button" class="ghost" id="cancelForm">Cancel</button>
    </div>
  </form>
</main>

<script src="js/api.js"></script>
<script>
navInit("inspections"); footerInit();

const tableBox = document.getElementById("tableBox");
const form = document.getElementById("inspForm");
const stallFilter = document.getElementById("stallFilter");
let editingId = null;   // null = creating, number = editing

function gradeFor(score) { return score >= 85 ? "A" : score >= 70 ? "B" : score >= 50 ? "C" : "D"; }

async function load() {
  const q = stallFilter.value ? "?stallId=" + stallFilter.value : "";
  try {
    const rows = await api(EP.inspections + q);      // Arri's confirmed shape
    if (!rows.length) { tableBox.innerHTML = '<p class="note">No inspections recorded yet.</p>'; return; }
    tableBox.innerHTML = `
      <table>
        <thead><tr><th>Grade</th><th>Stall</th><th>Officer</th><th>Date</th><th>Score</th><th>Remarks</th><th></th></tr></thead>
        <tbody>${rows.map(r => `
          <tr>
            <td><span class="sticker sm ${gradeFor(r.score)}">${gradeFor(r.score)}</span></td>
            <td>${r.stall_name}</td>
            <td>${r.officer_name}</td>
            <td class="mono">${(r.inspection_date ?? "").slice(0,10)}</td>
            <td class="mono">${r.score}</td>
            <td>${r.remarks ?? ""}</td>
            <td style="white-space:nowrap">
              <button class="small ghost" data-edit="${r.inspection_id}">Edit</button>
              <button class="small danger" data-del="${r.inspection_id}">Delete</button>
            </td>
          </tr>`).join("")}
        </tbody>
      </table>`;

    // stall filter options, built from the data
    if (stallFilter.options.length === 1) {
      const seen = new Map();
      rows.forEach(r => seen.set(r.stall_id, r.stall_name));
      [...seen.entries()].forEach(([id,name]) =>
        stallFilter.insertAdjacentHTML("beforeend", `<option value="${id}">${name}</option>`));
    }

    tableBox.querySelectorAll("[data-edit]").forEach(b => b.addEventListener("click", () => openEdit(b.dataset.edit)));
    tableBox.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", async () => {
      if (!confirm("Delete this inspection record? This cannot be undone.")) return;
      try { await api(EP.inspection(b.dataset.del), { method: "DELETE" }); toast("Inspection deleted"); load(); }
      catch (err) { toast(err.body?.message ?? "Delete failed"); }
    }));
  } catch (err) { tableBox.innerHTML = ""; showErrors(tableBox, err); }
}

function openCreate() {
  editingId = null;
  document.getElementById("formTitle").textContent = "Log new inspection";
  document.getElementById("createOnly").style.display = "";
  document.getElementById("lockedInfo").style.display = "none";
  form.reset(); form.style.display = ""; form.scrollIntoView({ behavior: "smooth" });
}

async function openEdit(id) {
  try {
    const r = await api(EP.inspection(id));
    editingId = id;
    document.getElementById("formTitle").textContent = "Edit inspection #" + id;
    // Arri's rule: stall/officer are locked after creation — show as read-only text
    document.getElementById("createOnly").style.display = "none";
    const locked = document.getElementById("lockedInfo");
    locked.style.display = "";
    locked.textContent = `Stall: ${r.stall_name} · Officer: ${r.officer_name} (locked after creation)`;
    document.getElementById("score").value = r.score;
    document.getElementById("remarks").value = r.remarks ?? "";
    document.getElementById("formErrors").innerHTML = "";
    form.style.display = ""; form.scrollIntoView({ behavior: "smooth" });
  } catch (err) { toast(err.body?.message ?? "Could not load inspection"); }
}

form.addEventListener("submit", async e => {
  e.preventDefault();
  const errBox = document.getElementById("formErrors"); errBox.innerHTML = "";
  try {
    if (editingId) {
      await api(EP.inspection(editingId), { method: "PUT",
        body: { score: Number(document.getElementById("score").value),
                remarks: document.getElementById("remarks").value } });
      toast("Inspection updated");
    } else {
      await api(EP.inspections, { method: "POST",
        body: { stallId: Number(document.getElementById("stallId").value),
                officerId: Number(document.getElementById("officerId").value),
                score: Number(document.getElementById("score").value),
                remarks: document.getElementById("remarks").value } });
      toast("Inspection logged");
    }
    form.style.display = "none"; load();
  } catch (err) { showErrors(errBox, err); }   // Arri's 400s are human-readable — show directly
});

document.getElementById("newBtn").addEventListener("click", openCreate);
document.getElementById("cancelForm").addEventListener("click", () => form.style.display = "none");
stallFilter.addEventListener("change", load);
load();
</script>
</body>
</html>
